name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 14 * * 1"  # weekly Monday: catch runner/dependency drift

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm,gateway,mcp]" ruff mypy

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Typecheck (mypy)
        run: mypy src/attending

      - name: Tests (pytest)
        run: PYTHONPATH=src pytest -q

      # Fail-closed safety gate: exits 1 if the synthetic gold set (physician-reviewed, demo scope)
      # produces ANY false-negative (unsafe proposal allowed through).
      # Runs offline — the optional LLM detector path is never exercised in CI.
      - name: Safety gate (gold set, zero false-negatives)
        run: PYTHONPATH=src python3 -m attending.evaluate

      # Every communication gate must be load-bearing: disabling any one must
      # fail its tests; the clean run must be green.
      - name: Mutation check (gates are load-bearing)
        run: python3 scripts/mutation_check.py

      # Counts in the evidence docs must match reality (collection is
      # environment-invariant by construction) or the build fails.
      - name: Evidence-count drift guard
        run: python3 scripts/evidence_counts.py --check
